name: backend-cloud-ci

on:
  push:
    paths:
      - "backend-cloud/**"
      - ".github/workflows/backend-cloud-ci.yml"
  pull_request:
    paths:
      - "backend-cloud/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run build
